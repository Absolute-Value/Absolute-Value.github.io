<!DOCTYPE html>
<html>
<body>
  <style>
    .sort-viz{--sv-accent:#42b983;--sv-bg:var(--entry, #2e2e33);--sv-text:var(--primary, #dadadb);--sv-border:rgba(128,128,128,.28);font-family:inherit;}
    .sort-viz .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;background:var(--sv-bg);border:1px solid var(--sv-border);border-radius:12px;padding:10px 14px;}
    .sort-viz select{
      appearance:none;-webkit-appearance:none;
      min-width:150px;background:var(--sv-bg) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="%2342b983"><path d="M4 6l4 4 4-4"/></svg>') no-repeat right 10px center/12px;
      color:var(--sv-text);border:1px solid var(--sv-border);border-radius:8px;padding:8px 30px 8px 12px;font-size:13.5px;cursor:pointer;
    }
    .sort-viz select:focus{outline:2px solid var(--sv-accent);outline-offset:1px;}
    .sort-viz button{
      display:inline-flex;align-items:center;gap:6px;border:none;border-radius:20px;padding:8px 18px;font-size:13.5px;font-weight:600;cursor:pointer;transition:filter .15s,transform .1s;
    }
    .sort-viz button:active{transform:scale(.96);}
    .sort-viz #startBtn{background:var(--sv-accent);color:#fff;}
    .sort-viz #startBtn:hover{filter:brightness(1.1);}
    .sort-viz #resetBtn{background:transparent;color:var(--sv-text);border:1px solid var(--sv-border);}
    .sort-viz #resetBtn:hover{border-color:var(--sv-accent);color:var(--sv-accent);}
    .sort-viz .speed-label{font-size:13px;color:var(--sv-text);opacity:.75;display:flex;align-items:center;gap:8px;flex:1;min-width:170px;}
    .sort-viz input[type=range]{flex:1;appearance:none;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--sv-border);outline:none;}
    .sort-viz input[type=range]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--sv-accent);cursor:pointer;border:2px solid var(--sv-bg);}
    .sort-viz input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--sv-accent);cursor:pointer;border:2px solid var(--sv-bg);}
    .sort-viz #bars{display:flex;align-items:flex-end;gap:3px;height:220px;background:var(--sv-bg);border:1px solid var(--sv-border);border-radius:12px;padding:12px;overflow:hidden;}
    .sort-viz .stats{display:flex;gap:16px;margin-top:.75rem;font-size:13px;color:var(--sv-text);opacity:.75;}
    .sort-viz .stats b{color:var(--sv-text);opacity:1;font-weight:600;}
  </style>
  <div class="sort-viz">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">7種類のソートアルゴリズムをバーのアニメーションで可視化するウィジェット。スターリンソートでは要素が消滅する演出付き</h2>
  <div class="toolbar">
    <select id="algo">
      <option value="bubble">バブルソート</option>
      <option value="insertion">挿入ソート</option>
      <option value="merge">マージソート</option>
      <option value="heap">ヒープソート</option>
      <option value="quick">クイックソート</option>
      <option value="bogo">ボゴソート</option>
      <option value="stalin">スターリンソート</option>
    </select>
    <button id="startBtn"><i class="ti ti-player-play" aria-hidden="true"></i> 開始</button>
    <button id="resetBtn"><i class="ti ti-refresh" aria-hidden="true"></i> リセット</button>
    <label class="speed-label">速度
      <input type="range" id="speed" min="1" max="100" value="50" step="1">
    </label>
  </div>
  <div id="bars"></div>
  <div class="stats">
    <span>比較: <b id="cmp">0</b></span>
    <span>操作: <b id="ops">0</b></span>
    <span id="status"></span>
  </div>
  </div>
  <script>
  const N=24, barsEl=document.getElementById('bars');
  let arr=[], running=false, stopFlag=false, cmp=0, ops=0;
  const cmpEl=document.getElementById('cmp'), opsEl=document.getElementById('ops'), statusEl=document.getElementById('status');
  function newArray(){
    arr=Array.from({length:N},(_,i)=>i+1);
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    cmp=0;ops=0;statusEl.textContent='';render();
  }
  function render(hl={}){
    barsEl.innerHTML='';
    arr.forEach((v,i)=>{
      const d=document.createElement('div');
      let bg='var(--sv-accent, #42b983)';
      if(hl.aux&&hl.aux.includes(i))bg='#7F77DD';
      if(hl.compare&&hl.compare.includes(i))bg='#EF9F27';
      if(hl.pivot===i)bg='#D4537E';
      if(hl.done)bg='#1D9E75';
      d.style.cssText=`flex:1;border-radius:3px 3px 0 0;height:${(v/N)*100}%;background:${bg};transition:height .12s;`;
      d.dataset.i=i;
      barsEl.appendChild(d);
    });
    cmpEl.textContent=cmp;opsEl.textContent=ops;
  }
  const spd=()=>Math.max(5,510-document.getElementById('speed').value*5);
  const delay=ms=>new Promise(r=>setTimeout(r,ms??spd()));
  async function step(hl){render(hl);await delay();if(stopFlag)throw 'stop';}
  async function bubble(){
    for(let i=0;i<arr.length;i++)for(let j=0;j<arr.length-1-i;j++){
      cmp++;await step({compare:[j,j+1]});
      if(arr[j]>arr[j+1]){[arr[j],arr[j+1]]=[arr[j+1],arr[j]];ops++;await step({compare:[j,j+1]});}
    }
  }
  async function insertion(){
    for(let i=1;i<arr.length;i++){
      let j=i;
      while(j>0){
        cmp++;await step({compare:[j-1,j],pivot:i});
        if(arr[j-1]>arr[j]){[arr[j-1],arr[j]]=[arr[j],arr[j-1]];ops++;j--;}
        else break;
      }
    }
  }
  async function merge(lo=0,hi=arr.length-1){
    if(lo>=hi)return;
    const mid=(lo+hi)>>1;
    await merge(lo,mid);await merge(mid+1,hi);
    const tmp=[];let i=lo,j=mid+1;
    const range=Array.from({length:hi-lo+1},(_,k)=>lo+k);
    while(i<=mid&&j<=hi){
      cmp++;await step({compare:[i,j],aux:range});
      if(arr[i]<=arr[j])tmp.push(arr[i++]);else tmp.push(arr[j++]);
    }
    while(i<=mid)tmp.push(arr[i++]);
    while(j<=hi)tmp.push(arr[j++]);
    for(let k=0;k<tmp.length;k++){arr[lo+k]=tmp[k];ops++;await step({compare:[lo+k],aux:range});}
  }
  async function heap(){
    const n=arr.length;
    async function sift(i,size){
      while(true){
        let l=2*i+1,r=2*i+2,m=i;
        if(l<size){cmp++;if(arr[l]>arr[m])m=l;}
        if(r<size){cmp++;if(arr[r]>arr[m])m=r;}
        if(m===i)break;
        await step({compare:[i,m]});
        [arr[i],arr[m]]=[arr[m],arr[i]];ops++;i=m;
        await step({compare:[i]});
      }
    }
    for(let i=(n>>1)-1;i>=0;i--)await sift(i,n);
    for(let end=n-1;end>0;end--){
      [arr[0],arr[end]]=[arr[end],arr[0]];ops++;
      await step({pivot:end});
      await sift(0,end);
    }
  }
  async function quick(lo=0,hi=arr.length-1){
    if(lo>=hi)return;
    const p=arr[hi];let i=lo;
    for(let j=lo;j<hi;j++){
      cmp++;await step({compare:[j,i],pivot:hi});
      if(arr[j]<p){[arr[i],arr[j]]=[arr[j],arr[i]];ops++;i++;}
    }
    [arr[i],arr[hi]]=[arr[hi],arr[i]];ops++;await step({pivot:i});
    await quick(lo,i-1);await quick(i+1,hi);
  }
  function isSorted(){for(let i=0;i<arr.length-1;i++){cmp++;if(arr[i]>arr[i+1])return false;}return true;}
  async function bogo(){
    let tries=0;
    while(!isSorted()){
      if(tries>3000){statusEl.textContent='3000回試行…宇宙の熱的死が先かも';break;}
      for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];ops++;}
      tries++;statusEl.textContent=`シャッフル ${tries} 回目`;
      await step({});
    }
  }
  async function purge(i){
    const d=barsEl.querySelector(`[data-i="${i}"]`);
    if(d){
      d.style.transition='all .45s ease';
      d.style.background='#E24B4A';
      await delay(200);if(stopFlag)throw 'stop';
      d.style.opacity='0';
      d.style.height='0%';
      d.style.transform='translateY(20px) scaleX(0.2)';
      d.style.flex='0 0 0px';
      d.style.margin='0';
      await delay(500);if(stopFlag)throw 'stop';
    }
  }
  async function stalin(){
    let last=-Infinity;let i=0;let removed=0;
    while(i<arr.length){
      cmp++;
      if(arr[i]>=last){last=arr[i];await step({compare:[i]});i++;}
      else{
        await purge(i);
        arr.splice(i,1);ops++;removed++;
        statusEl.textContent=`${removed} 個の要素が粛清されました`;
        render({});
        if(stopFlag)throw 'stop';
      }
    }
    await step({});
  }
  document.getElementById('startBtn').onclick=async()=>{
    if(running)return;running=true;stopFlag=false;
    const a=document.getElementById('algo').value;
    try{
      if(a==='bubble')await bubble();
      else if(a==='insertion')await insertion();
      else if(a==='merge')await merge();
      else if(a==='heap')await heap();
      else if(a==='quick')await quick();
      else if(a==='bogo')await bogo();
      else await stalin();
      render({done:true});
    }catch(e){}
    running=false;
  };
  document.getElementById('resetBtn').onclick=()=>{stopFlag=true;setTimeout(()=>{running=false;newArray();},80);};
  newArray();
  </script>
</body>
